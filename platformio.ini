; EWatch v2 firmware — PlatformIO project.
; Target: ESP32-S3FH4R2 (4 MB internal flash, 2 MB internal QSPI PSRAM, native USB).
;
; This project targets arduino-esp32 v2.x (what `platform = espressif32` ships
; today). LEDC therefore uses the channel-based API (ledcSetup/ledcAttachPin/
; ledcWrite-by-channel). GFX Library is pinned below 1.5.0 because 1.5+
; depends on v3-only headers (esp32-hal-periman.h).

[env:ewatch]
platform        = espressif32
board           = esp32-s3-devkitc-1
framework       = arduino
monitor_speed   = 115200

board_upload.flash_size = 4MB
board_build.flash_size  = 4MB
board_build.partitions  = default.csv
board_build.flash_mode  = qio
board_build.psram_type  = qspi

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -Isrc/drivers
    -Isrc/core
    -Isrc/apps
    -Isrc/apps/system
    -Isrc/apps/assets

build_src_filter =
    +<*>
    -<_disabled/*>

lib_deps =
    moononournation/GFX Library for Arduino @ ~1.4.7
    https://github.com/fbiego/CST816S.git
    ricmoo/QRCode @ ^0.0.1