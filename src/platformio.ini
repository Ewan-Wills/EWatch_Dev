; EWatch v2 firmware — PlatformIO project.
; Target: ESP32-S3FH4R2 (4 MB internal flash, 2 MB internal QSPI PSRAM, native USB).
;
; The code uses the modern arduino-esp32 v3.x LEDC API (ledcAttach).
; If your build pulls v2.x and you see "ledcAttach was not declared", pin
; the platform to a v3-bearing release, e.g. platform_packages or a recent
; pioarduino fork.

[env:ewatch]
platform        = espressif32
board           = esp32-s3-devkitc-1
framework       = arduino
monitor_speed   = 115200

board_upload.flash_size = 4MB
board_build.flash_size  = 4MB
board_build.partitions  = default.csv
board_build.flash_mode  = qio
board_build.psram_type  = qspi

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DSENSOR_TEST

lib_deps =
    moononournation/GFX Library for Arduino @ ^1.4.7
    https://github.com/fbiego/CST816S.git
